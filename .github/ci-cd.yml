name: CI/CD Pipeline - Demo

on:
  push:
    branches: [ master ]      # ← Changé en master
  pull_request:
    branches: [ master ]      # ← Changé en master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image (simulation)
        run: echo "✅ Image Docker construite avec succès (simulation)!"

      - name: Simulation Déploiement sur Staging
        if: github.ref == 'refs/heads/master'   # ← Changé en master
        run: echo "🚀 Application déployée avec succès sur l'environnement Staging !"

      - name: Pipeline terminé
        run: echo "🎉 Pipeline CI/CD terminé avec succès !"