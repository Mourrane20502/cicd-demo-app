name: CI/CD Pipeline - Demo

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Simulation Build & Staging
        run: |
          echo "✅ Build Docker simulé avec succès !"
          echo "🚀 Déploiement simulé sur Staging terminé !"

      - name: Pipeline terminé
        run: echo "🎉 Tout est OK - Pipeline CI/CD réussi !"